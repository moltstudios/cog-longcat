name: Push to Replicate

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Free disk space (aggressive)
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcActions
          sudo rm -rf /usr/local/.ghcup /usr/lib/jvm /usr/lib/mono /usr/lib/firefox /usr/lib/google-cloud-sdk
          sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python /opt/hostedtoolcache/Ruby
          sudo apt-get clean
          sudo docker system prune -af --volumes || true
          echo "=== After cleanup ==="
          df -h /

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          cog-version: "v0.20.0"

      - name: Login to Replicate registry
        run: |
          echo "${{ secrets.REPLICATE_API_TOKEN }}" | docker login r8.im -u moltstudios --password-stdin

      - name: Build and push
        run: |
          echo "=== Disk space before build ==="
          df -h /
          cog build -t r8.im/moltstudios/longcat-avatar-v2
          echo "=== Disk space after build ==="
          df -h /
          docker push r8.im/moltstudios/longcat-avatar-v2

name: Push to Replicate

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcActions
          df -h

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          cog-version: "v0.20.0"

      - name: Login to Replicate registry
        run: |
          echo "${{ secrets.REPLICATE_API_TOKEN }}" | docker login r8.im -u moltstudios --password-stdin

      - name: Build and push
        run: |
          cog build -t r8.im/moltstudios/longcat-avatar
          docker push r8.im/moltstudios/longcat-avatar

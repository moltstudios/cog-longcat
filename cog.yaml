# LongCat-Video-Avatar-1.5 — Minimal image, runtime dep install
# Image: ~5GB (CUDA base + torch only)
# All other deps installed during setup() via pip

build:
  gpu: true
  system_packages:
    - "libgl1"
    - "libglib2.0-0"
    - "ffmpeg"
  python_version: "3.12"
  python_packages:
    - "torch==2.6.0"

run: "predict.py:Predictor"

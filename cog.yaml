# LongCat-Video-Avatar-1.5 Cog Deployment
# Hardware: A100 80GB

build:
  gpu: true
  cuda: "12.6"
  python_version: "3.12"
  python_packages:
    - "torch==2.6.0"
    - "torchvision==0.21.0"
    - "torchaudio==2.6.0"
    - "numpy==1.26.4"
    - "transformers==4.41.0"
    - "diffusers==0.35.1"
    - "safetensors==0.5.3"
    - "loguru==0.7.2"
    - "einops==0.8.0"
    - "ftfy==6.2.0"
    - "imageio==2.37.0"
    - "imageio-ffmpeg==0.6.0"
    - "scipy==1.15.3"
    - "soundfile==0.13.1"
    - "librosa==0.11.0"
    - "regex==2024.11.6"
    - "huggingface_hub==0.34.0"
    - "accelerate==1.7.0"
  run:
    - apt-get update && apt-get install -y libgl1-mesa-glx libglib2.0-0 ffmpeg || true
    - pip install flash-attn==2.7.4.post1 --no-build-isolation
    - python3 download_models.py

predict: "predict.py:Predictor"

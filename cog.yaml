# LongCat-Video-Avatar-1.5 Cog Deployment
# Hardware: A100 80GB

build:
  gpu: true
  system:
    - libgl1-mesa-glx
    - libglib2.0-0
    - ffmpeg
  python_version: "3.12"
  python_packages:
    - "torch==2.6.0"
    - "torchvision==0.21.0"
    - "torchaudio==2.6.0"
    - "numpy==1.26.4"
    - "transformers==4.41.0"
    - "diffusers==0.35.1"
    - "safetensors==0.5.3"
    - "loguru==0.7.2"
    - "einops==0.8.0"
    - "ftfy==6.2.0"
    - "psutil==6.0.0"
    - "av==12.0.0"
    - "opencv-python==4.9.0.80"
    - "imageio==2.37.0"
    - "imageio-ffmpeg==0.6.0"
    - "scikit-learn==1.6.1"
    - "scikit-image==0.25.2"
    - "scipy==1.15.3"
    - "soundfile==0.13.1"
    - "soxr==0.5.0.post1"
    - "librosa==0.11.0"
    - "audio-separator==0.30.2"
    - "pyloudnorm==0.1.1"
    - "nvidia-ml-py==13.580.65"
    - "onnx==1.18.0"
    - "onnxruntime==1.16.3"
    - "regex==2024.11.6"
    - "huggingface_hub==0.32.4"
    - "pyarrow==20.0.0"
    - "accelerate==1.7.0"
  run:
    - pip install flash-attn==2.7.4.post1 --no-build-isolation

predict: "predict.py:Predictor"
